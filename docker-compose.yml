version: '3'

services:
  navidash:
    image: ghcr.io/wtfllix/navidash:latest
    container_name: navidash
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Persist data outside the git working tree to avoid accidental loss during redeploys
      - ${NAVIDASH_DATA_DIR:-/opt/navidash-data}:/app/data
    environment:
      - NODE_ENV=production
      - DEMO_MODE=false
      - NEXT_PUBLIC_DEMO_MODE=false
      - DATA_DIR=/app/data
