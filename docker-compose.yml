version: '3'

services:
  navidash:
    build: .
    container_name: navidash
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Persist data to local ./data directory
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - DEMO_MODE=false
      - NEXT_PUBLIC_DEMO_MODE=false
      - DATA_DIR=/app/data
